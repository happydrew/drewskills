name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate registry
        run: python scripts/validate_registry.py
      - name: Build public catalog
        run: python scripts/build_public_catalog.py
